# Scene composition
num_doctors: 2
num_assistants: 2
num_active_doctors: 1
num_active_assistants: 1

# Occlusions
occlusion_obj_appearance_prob: 0
instrument_hidden_prob: 0

# Ascii export
use_grid_movement: True
export_ascii: True
grid_size: 10

enable_fake_handovers: True
fake_handover_prob: 0.5

handover_success_rate: 0.25
approach_without_ho_rate: 0.25

# randomized instruments
randomize_instruments: True

# Output settings
output_dir: "toy_data_ascii_p2_a1_o0_FO75_HARD_irand_grid"